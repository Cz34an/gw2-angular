<section class="space-y-4 p-4">
  <h2 class="text-xl font-semibold">Eventy</h2>

  @if (store.isLoading()) {
    <p>Ladowanie eventow...</p>
  } @else if (store.hasError()) {
    <div class="space-y-2">
      <p class="text-red-600">Error</p>
      <button (click)="store.loadEvents()" class="rounded border px-3 py-1" type="button">
        Sprobuj ponownie
      </button>
    </div>
  } @else if (!store.events().length) {
    <p>Brak eventow.</p>
  } @else {
    <div class="grid grid-cols-2 gap-3">
      @for (event of store.events(); track event.id ?? $index) {
        <app-event-card [event]="event" />
      }
    </div>

  }
</section>
