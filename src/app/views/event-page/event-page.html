@let e = store.eventDetails();

@if (e) {
  <div class="w-full @5xl:w-75" hlmCard>
    <div hlmCardHeader>
      <h2 class="text-3xl" hlmCardTitle>{{ e.title }}</h2>
      <p class="text-sm" hlmCardDescription>{{ e.description }}</p>
    </div>
    <div class="flex flex-col gap-2" hlmCardContent>
      <div class="border rounded-md py-2 px-4 flex gap-2 items-center">
        <ng-icon hlm name="lucideCalendar" />
        <div class="flex flex-col">
          <span class="uppercase text-muted-foreground text-[10px]">Start</span>
          <span>{{ e.startTime | date:'dd.MM, HH:mm' }}</span>
        </div>
      </div>
      <div class="border rounded-md py-2 px-4 flex gap-2 items-center">
        <ng-icon hlm name="lucideTimer" />
        <div class="flex flex-col">
          <span class="uppercase text-muted-foreground text-[10px]">Czas trwania</span>
          <span>{{ e.startTime | duration:e.endTime }}</span>
        </div>
      </div>
    </div>
  </div>
  <div class="grow">
    <div class="grid grid-cols-2 grid-flow-row-dense gap-4">
      @for (slot of e.slots; track slot.id) {
        <app-event-slot [slot]="slot" />
      }
    </div>
  </div>
}

<app-choose-role-dialog />
