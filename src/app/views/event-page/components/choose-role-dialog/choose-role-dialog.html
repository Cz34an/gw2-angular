<hlm-dialog (closed)="closeDialog()" [state]="dialogState()">
  <hlm-dialog-content *hlmDialogPortal="let ctx">
    @let s = store.selectedFreeSlot();
    @if (s) {
      <hlm-dialog-header>
        <h3 hlmDialogTitle>Wybierz flex role</h3>
        <p hlmDialogDescription>
          Wybierz role na których możesz zagrać.
        </p>
      </hlm-dialog-header>
      <div class="flex flex-col gap-1">
        <h4>Wybrana rola</h4>
        <app-build-badges [build]="s.requiredBuild" class="mb-1" />
        <h4>Flex role</h4>
        <hlm-select-multiple>
          <hlm-select-trigger class="w-full">
            <hlm-select-placeholder>Wybierz role flex</hlm-select-placeholder>
            <ng-template hlmSelectValues let-values>
              <hlm-select-values-content>
                <app-build-badges [build]="values[0]" />
                @if (values.length > 1) {
                  +{{ values.length - 1 }}
                }
              </hlm-select-values-content>
            </ng-template>
          </hlm-select-trigger>
          <hlm-select-content *hlmSelectPortal>
            <hlm-select-group>
              @for (item of store.allAvailableBuilds(); track item.key) {
                <hlm-select-item [value]="item.build">
                  <app-build-badges [build]="item.build" />
                </hlm-select-item>
              }
            </hlm-select-group>
          </hlm-select-content>
        </hlm-select-multiple>
      </div>
      <hlm-dialog-footer>
        <button hlmBtn hlmDialogClose variant="outline">Cancel</button>
        <button hlmBtn type="submit">Save changes</button>
      </hlm-dialog-footer>
    }
  </hlm-dialog-content>
</hlm-dialog>
